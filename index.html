<body>

<div class="container">
  <h2>Meeting Room Booking</h2>

  <!-- Calendar Type (future use) -->

<label>Calendar:</label> <select id="calendar"> <option value="meeting">Meeting Rooms</option> </select>

  <!-- Room -->

<label>Room:</label> <select id="room"> <option value="room 1">Small Room</option> <option value="room 2">Big Room</option> </select>

  <!-- Date -->

<label>Date:</label> <input type="date" id="date">

  <!-- Time -->

<label>Time:</label> <input type="time" id="time">

  <!-- Duration -->

<label>Duration (hours):</label> <input type="number" id="duration" min="1" value="1">

  <!-- Name -->

<label>Your Name:</label> <input type="text" id="name">

  <!-- Title -->

<label>Meeting Title:</label> <input type="text" id="title">

<button onclick="bookRoom()">Book</button>

  <div class="result" id="result"></div>
</div>

<script>
async function bookRoom() {

  const data = {
    room: document.getElementById("room").value,
    date: document.getElementById("date").value,
    time: document.getElementById("time").value,
    duration: document.getElementById("duration").value,
    name: document.getElementById("name").value,
    title: document.getElementById("title").value
  };

  // Basic validation
  if (!data.date || !data.time || !data.name || !data.title) {
    document.getElementById("result").innerText = "Please fill all required fields.";
    return;
  }

  document.getElementById("result").innerText = "Checking availability...";

  try {
    const res = await fetch("https://primary-production-877cc.up.railway.app/webhook/check-room", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify(data)
    });

    const result = await res.json();

    document.getElementById("result").innerText = result.reply || "Booking completed!";
  } catch (err) {
    document.getElementById("result").innerText = "Error connecting to server.";
  }
}
</script>

</body>
</html>
