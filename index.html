<!DOCTYPE html>
<html>
<head>
  <title>Meeting Room Booking</title>

  <!-- FullCalendar -->
  <link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.js"></script>

  <style>
    body {
      font-family: Arial;
      background: linear-gradient(135deg, #6c63ff, #8360c3);
      margin: 0;
      padding: 40px;
      color: white;
      text-align: center;
    }

    h1 {
      margin-bottom: 10px;
    }

    .controls {
      margin: 20px auto;
    }

    select {
      padding: 10px;
      border-radius: 8px;
      border: none;
      font-size: 16px;
    }

    #calendar {
      max-width: 1100px;
      margin: 30px auto;
      background: white;
      color: black;
      padding: 20px;
      border-radius: 16px;
    }
  </style>
</head>

<body>

<h1>Meeting Room Booking</h1>
<p>Select a room to view availability</p>

<div class="controls">
  <select id="roomSelect">
    <option value="room 1">Big Room</option>
    <option value="room 2">Small Room</option>
  </select>
</div>

<div id="calendar"></div>

<script>
document.addEventListener('DOMContentLoaded', function () {

  const roomSelect = document.getElementById("roomSelect");

  const calendars = {
    "room 1": "ba658fb3262cc83f80a6e7ee29f01d92cde458075b541498b06007ecf2525ee2@group.calendar.google.com",
    "room 2": "fb7664ab96162ab86d70ebafea95802ffa63e82816fcb7c85d41ce95cc5f2786@group.calendar.google.com"
  };

  const calendar = new FullCalendar.Calendar(document.getElementById('calendar'), {
    initialView: 'timeGridWeek',
    height: 650,
    timeZone: 'Europe/Athens',

    events: async function(fetchInfo, successCallback) {

      const selectedRoom = roomSelect.value;
      const calendarId = calendars[selectedRoom];

      const res = await fetch("https://primary-production-877cc.up.railway.app/webhook/get-events", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          calendarId: calendarId
        })
      });

      const data = await res.json();

      const events = data.map(e => ({
        id: e.id,
        title: e.summary || "Booked",
        start: e.start.dateTime,
        end: e.end.dateTime,
        color: selectedRoom === "room 1" ? "#3b82f6" : "#10b981"
      }));

      successCallback(events);
    }
  });

  calendar.render();

  roomSelect.addEventListener("change", () => {
    calendar.refetchEvents();
  });

});
</script>

</body>
</html>
