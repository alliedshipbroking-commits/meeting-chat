<!DOCTYPE html>
<html>
<head>
  <title>Meeting Room Booking</title>

  <!-- FullCalendar -->
  <link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.js"></script>

  <style>
    body {
      font-family: Arial;
      background: linear-gradient(135deg, #6c63ff, #8360c3);
      margin: 0;
      padding: 40px;
      color: white;
      text-align: center;
    }

    h1 {
      margin-bottom: 10px;
    }

    .form-box {
      background: white;
      color: black;
      padding: 20px;
      border-radius: 12px;
      max-width: 600px;
      margin: 20px auto;
    }

    input, select {
      padding: 10px;
      margin: 5px;
      width: 90%;
      border-radius: 8px;
      border: 1px solid #ccc;
    }

    button {
      padding: 12px;
      width: 95%;
      border: none;
      border-radius: 8px;
      background: #6c63ff;
      color: white;
      font-weight: bold;
      cursor: pointer;
    }

    #calendar {
      max-width: 1100px;
      margin: 30px auto;
      background: white;
      color: black;
      padding: 20px;
      border-radius: 16px;
    }
  </style>
</head>

<body>

<h1>Meeting Room Booking</h1>
<p>Select a room and book your meeting</p>

<!-- FORM -->
<div class="form-box">

  <select id="room">
    <option value="room 1">Big Room</option>
    <option value="room 2">Small Room</option>
  </select>

  <input type="date" id="date">
  <input type="time" id="time">

  <input type="number" id="duration" value="1" placeholder="Duration (hours)">

  <input type="text" id="name" placeholder="Your Name">
  <input type="text" id="title" placeholder="Meeting Title">

  <button onclick="book()">Book Meeting</button>

</div>

<!-- CALENDAR -->
<div id="calendar"></div>

<script>

let calendar;

document.addEventListener('DOMContentLoaded', function () {

  const calendars = {
    "room 1": "ba658fb3262cc83f80a6e7ee29f01d92cde458075b541498b06007ecf2525ee2@group.calendar.google.com",
    "room 2": "fb7664ab96162ab86d70ebafea95802ffa63e82816fcb7c85d41ce95cc5f2786@group.calendar.google.com"
  };

  calendar = new FullCalendar.Calendar(document.getElementById('calendar'), {

    initialView: 'timeGridWeek',
    height: 650,
    timeZone: 'Europe/Athens',

    // 🔥 DELETE EVENT
    eventClick: async function(info) {

      const confirmDelete = confirm(`Cancel "${info.event.title}"?`);
      if (!confirmDelete) return;

      const selectedRoom = document.getElementById("room").value;
      const calendarId = calendars[selectedRoom];

      try {
        await fetch("https://primary-production-877cc.up.railway.app/webhook/delete-event", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            eventId: info.event.id,
            calendarId: calendarId
          })
        });

        info.event.remove();

        setTimeout(() => {
          calendar.refetchEvents();
        }, 500);

      } catch (err) {
        console.error(err);
        alert("Error deleting event");
      }
    },

    // 🔥 LOAD EVENTS
    events: async function(fetchInfo, successCallback) {

      console.log("Reloading events...");

      const selectedRoom = document.getElementById("room").value;
      const calendarId = calendars[selectedRoom];

      try {
        const res = await fetch("https://primary-production-877cc.up.railway.app/webhook/get-events", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({ calendarId })
        });

        const data = await res.json();

        const events = (Array.isArray(data) ? data : [data])
          .filter(e => e && e.start && e.end)
          .map(e => ({
            id: e.id,
            title: e.summary || "Booked",
            start: e.start.dateTime || e.start,
            end: e.end.dateTime || e.end,
            color: selectedRoom === "room 1" ? "#3b82f6" : "#10b981"
          }));

        successCallback(events);

      } catch (err) {
        console.error("Error loading events:", err);
        successCallback([]);
      }
    }

  });

  calendar.render();

  // 🔁 ROOM CHANGE
  document.getElementById("room").addEventListener("change", () => {
    calendar.refetchEvents();
  });

  // 🔁 AUTO REFRESH
  setInterval(() => {
    calendar.refetchEvents();
  }, 10000);

});


// 🔥 BOOK FUNCTION
async function book() {

  const data = {
    room: document.getElementById("room").value,
    date: document.getElementById("date").value,
    time: document.getElementById("time").value,
    duration: document.getElementById("duration").value,
    name: document.getElementById("name").value,
    title: document.getElementById("title").value
  };

  try {
    const res = await fetch("https://primary-production-877cc.up.railway.app/webhook/check-room", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify(data)
    });

    const result = await res.json();

    alert(result.reply);

    setTimeout(() => {
      calendar.removeAllEvents();
      calendar.refetchEvents();
    }, 800);

  } catch (err) {
    console.error(err);
    alert("Error booking meeting");
  }
}

</script>

</body>
</html>
