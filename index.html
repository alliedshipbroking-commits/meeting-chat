<!DOCTYPE html>
<html>
<head>
  <title>Meeting Room Chat</title>
  <style>
    body {
      font-family: Arial;
      max-width: 600px;
      margin: 40px auto;
    }
    #chat {
      border: 1px solid #ccc;
      padding: 10px;
      height: 400px;
      overflow-y: auto;
    }
    .user { color: blue; }
    .bot { color: green; }
    input {
      width: 80%;
      padding: 10px;
    }
    button {
      padding: 10px;
    }
  </style>
</head>
<body>

<h2>Meeting Room Assistant</h2>

<div id="chat"></div>

<input id="message" placeholder="Type your message..." />
<button onclick="sendMessage()">Send</button>

<script>
console.log("NEW VERSION LOADED");

// ✅ SESSION ID (memory)
let sessionId = localStorage.getItem("meeting_session_id");
if (!sessionId) {
  sessionId = crypto.randomUUID();
  localStorage.setItem("meeting_session_id", sessionId);
}

// ✅ SEND MESSAGE
async function sendMessage() {
  const input = document.getElementById("message");
  const text = input.value;

  if (!text) return;

  addMessage("You: " + text, "user");
  input.value = "";

  try {
    const response = await fetch("https://primary-production-877cc.up.railway.app/webhook/check-room", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        message: text,
        sessionId: sessionId
      })
    });

    const data = await response.json();

    addMessage("Bot: " + data.reply, "bot");

  } catch (error) {
    addMessage("Bot: Error connecting to server", "bot");
    console.error(error);
  }
}

// ✅ CHAT UI
function addMessage(text, type) {
  const chat = document.getElementById("chat");
  const div = document.createElement("div");
  div.className = type;
  div.innerText = text;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}
</script>

</body>
</html>
